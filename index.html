<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Brew & Bloom Coffee</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --coffee-dark: #2C1810;
            --coffee-medium: #5D4037;
            --coffee-light: #8D6E63;
            --cream: #FFF8E7;
            --warm-gold: #D4A574;
            --soft-white: #FAFAFA;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--cream);
            color: var(--coffee-dark);
            overflow-x: hidden;
        }

        /* 3D Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 248, 231, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(44, 24, 16, 0.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--coffee-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotateY(5deg);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--coffee-medium);
            font-weight: 500;
            position: relative;
            padding: 0.5rem 0;
            transition: all 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--warm-gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--coffee-dark);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hero Section with 3D Effect */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            perspective: 1000px;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--cream) 0%, #FFE4C4 100%);
            transform-style: preserve-3d;
        }

        .floating-coffee {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--warm-gold) 0%, var(--coffee-light) 70%);
            border-radius: 50%;
            top: 50%;
            right: 10%;
            transform: translateY(-50%) translateZ(-100px);
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            filter: blur(60px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(-50%) translateZ(-100px) scale(1); }
            50% { transform: translateY(-50%) translateZ(-100px) scale(1.1); }
        }

        .hero-content {
            text-align: center;
            z-index: 10;
            transform-style: preserve-3d;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 4.5rem;
            color: var(--coffee-dark);
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            transform: translateZ(50px);
        }

        .hero p {
            font-size: 1.4rem;
            color: var(--coffee-medium);
            margin-bottom: 2rem;
            max-width: 600px;
            transform: translateZ(30px);
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 3rem;
            background: var(--coffee-dark);
            color: var(--cream);
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transform-style: preserve-3d;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(44, 24, 16, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-5px) translateZ(20px);
            box-shadow: 0 20px 40px rgba(44, 24, 16, 0.4);
            background: var(--coffee-medium);
        }

        /* 3D Cards Section */
        .features {
            padding: 6rem 5%;
            background: var(--soft-white);
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: var(--coffee-dark);
            margin-bottom: 3rem;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            background: white;
